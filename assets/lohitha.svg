<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Lohitha Bandaru avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="55%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="200" fill="url(#bg)"/>
  <rect width="400" height="400" rx="200" fill="url(#glow)"/>
  <circle cx="200" cy="200" r="184" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <text x="200" y="232" text-anchor="middle"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="180" font-style="italic" fill="#0b1a36" opacity="0.92">LB</text>
